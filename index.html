<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Presupuesto Inteligente Uruguay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --bg:#EDEAE2;
    --surface:#FFFFFF;
    --surface-alt:#F5F1E7;
    --ink:#23262B;
    --ink-soft:#63676E;
    --accent:#F2A900;
    --accent-ink:#23262B;
    --structural:#2C4A5E;
    --structural-ink:#EDEAE2;
    --danger:#C0392B;
    --success:#2F6844;
    --border:#D8D2C2;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;
    padding-bottom:78px;
    min-height:100vh;
  }
  h1,h2,h3{font-family:'Big Shoulders Display',sans-serif;font-weight:800;letter-spacing:.01em;margin:0;text-transform:uppercase;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);}
  .topbar{
    background:var(--structural);color:var(--structural-ink);
    padding:18px 16px 14px;
    position:sticky;top:0;z-index:20;
    box-shadow:0 2px 0 rgba(0,0,0,.08);
  }
  .topbar .brand{display:flex;align-items:center;gap:10px;}
  .topbar h1{font-size:20px;color:#fff;}
  .topbar .sub{font-size:11px;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;color:#B9C6CD;text-transform:uppercase;margin-top:2px;}
  main{padding:16px;max-width:640px;margin:0 auto;}
  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:14px;
  }
  .ticket{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    overflow:hidden;
    margin-bottom:14px;
  }
  .ticket .ticket-head{padding:14px 16px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .ticket .perf{
    height:0;border-top:2px dashed var(--border);position:relative;margin:0 16px;
  }
  .ticket .ticket-body{padding:14px 16px;}
  label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin:12px 0 5px;text-transform:uppercase;letter-spacing:.03em;}
  label:first-child{margin-top:0;}
  input[type=text],input[type=number],input[type=email],input[type=tel],select,textarea{
    width:100%;padding:11px 12px;border:1.5px solid var(--border);border-radius:8px;
    font-size:15px;font-family:'IBM Plex Sans',sans-serif;background:#fff;color:var(--ink);
  }
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:1px;border-color:var(--accent);}
  textarea{resize:vertical;min-height:60px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:12px 16px;border-radius:8px;border:none;font-size:14px;font-weight:700;
    font-family:'IBM Plex Sans',sans-serif;cursor:pointer;width:100%;text-transform:uppercase;letter-spacing:.02em;
  }
  .btn-primary{background:var(--accent);color:var(--accent-ink);}
  .btn-secondary{background:var(--structural);color:#fff;}
  .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--ink);}
  .btn-danger{background:transparent;border:1.5px solid var(--danger);color:var(--danger);}
  .btn-sm{padding:8px 12px;font-size:12px;width:auto;}
  .btn-row{display:flex;gap:8px;margin-top:10px;}
  .btn-row .btn{flex:1;}
  .item-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:8px;}
  .item-row:last-child{border-bottom:none;}
  .item-name{font-weight:600;font-size:14px;}
  .item-meta{font-size:12px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;}
  .item-price{font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:17px;white-space:nowrap;}
  .x-btn{background:none;border:none;color:var(--danger);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1;}
  .totals{background:var(--surface-alt);border-radius:8px;padding:14px;margin-top:8px;}
  .total-line{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--ink-soft);}
  .total-final{display:flex;justify-content:space-between;align-items:baseline;padding-top:10px;margin-top:6px;border-top:1.5px solid var(--border);}
  .total-final .label{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft);}
  .total-final .amount{font-family:'Big Shoulders Display',sans-serif;font-size:34px;font-weight:800;color:var(--structural);}
  .badge{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:20px;font-weight:600;}
  .badge-borrador{background:#E5E1D6;color:var(--ink-soft);}
  .badge-enviado{background:#DDE7EC;color:var(--structural);}
  .badge-aprobado{background:#DCEBE0;color:var(--success);}
  .badge-rechazado{background:#F3DBD6;color:var(--danger);}
  .empty{text-align:center;padding:40px 16px;color:var(--ink-soft);}
  .empty .eyebrow{margin-bottom:6px;}
  .nav{
    position:fixed;bottom:0;left:0;right:0;z-index:30;
    background:var(--structural);
    display:flex;box-shadow:0 -2px 8px rgba(0,0,0,.15);
  }
  .nav button{
    flex:1;background:none;border:none;color:#9FB0B8;padding:10px 4px 8px;
    display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;
    font-family:'IBM Plex Sans',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;
  }
  .nav button.active{color:var(--accent);}
  .nav button .ic{font-size:19px;}
  .list-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);gap:10px;}
  .list-item:last-child{border-bottom:none;}
  .list-item .name{font-weight:600;font-size:14.5px;}
  .list-item .meta{font-size:12px;color:var(--ink-soft);}
  .fab-add{background:var(--structural);color:#fff;border:none;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.02em;}
  .modal-bg{position:fixed;inset:0;background:rgba(35,38,43,.55);z-index:50;display:flex;align-items:flex-end;}
  .modal{background:#fff;width:100%;max-height:88vh;overflow-y:auto;border-radius:16px 16px 0 0;padding:18px 16px 24px;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .modal-close{background:none;border:none;font-size:22px;color:var(--ink-soft);cursor:pointer;}
  .toast{position:fixed;bottom:90px;left:16px;right:16px;background:var(--ink);color:#fff;padding:12px 16px;border-radius:8px;font-size:13.5px;z-index:60;text-align:center;box-shadow:0 4px 12px rgba(0,0,0,.2);}
  .section-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .autocomplete{position:relative;}
  .autocomplete-list{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--border);border-top:none;border-radius:0 0 8px 8px;max-height:180px;overflow-y:auto;z-index:10;}
  .autocomplete-item{padding:10px 12px;font-size:14px;border-bottom:1px solid var(--border);cursor:pointer;}
  .autocomplete-item:last-child{border-bottom:none;}
  .logo-preview{max-width:100px;max-height:60px;display:block;margin:8px 0;border:1px solid var(--border);border-radius:6px;padding:4px;background:#fff;}
  .hint{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .loading{text-align:center;padding:60px 16px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;font-size:13px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><h1 id="brandName">Presupuesto Inteligente</h1></div>
  <div class="sub">Uruguay · Fase 1</div>
</div>

<main id="app"><div class="loading">CARGANDO…</div></main>

<nav class="nav">
  <button data-view="nuevo" class="active"><span class="ic">🧾</span>Nuevo</button>
  <button data-view="historial"><span class="ic">🕘</span>Historial</button>
  <button data-view="clientes"><span class="ic">👥</span>Clientes</button>
  <button data-view="materiales"><span class="ic">📦</span>Materiales</button>
  <button data-view="config"><span class="ic">⚙️</span>Config</button>
</nav>

<script>
/* ============================================================
   PRESUPUESTO INTELIGENTE URUGUAY — Fase 1 MVP
   Single-file HTML + Supabase + jsPDF
   ============================================================ */

const SUPABASE_URL = 'https://xqorwcuwjkkleelglhkh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eiA4suzn59N_U7xVGeEUDA__sAy42Zx';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let state = {
  config: null,
  clientes: [],
  materiales: [],
  view: 'nuevo',
  nuevoItems: [],
  nuevoClienteId: null,
};

const $app = document.getElementById('app');

function money(n){
  const v = Number(n||0);
  const symbol = state.config && state.config.moneda === 'USD' ? 'US$' : '$';
  return symbol + ' ' + v.toLocaleString('es-UY', {minimumFractionDigits:0, maximumFractionDigits:0});
}
function uid(){ return Math.random().toString(36).slice(2,9); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){
  const t = document.createElement('div');
  t.className='toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}

/* ---------------- INIT ---------------- */
async function init(){
  try{
    const [cfgRes, clientesRes, materialesRes] = await Promise.all([
      sb.from('configuracion').select('*').limit(1).single(),
      sb.from('clientes').select('*').order('nombre'),
      sb.from('materiales').select('*').order('nombre'),
    ]);
    if(cfgRes.error) throw cfgRes.error;
    state.config = cfgRes.data;
    state.clientes = clientesRes.data || [];
    state.materiales = materialesRes.data || [];
    document.getElementById('brandName').textContent = state.config.nombre_negocio || 'Presupuesto Inteligente';
    render();
  }catch(err){
    $app.innerHTML = `<div class="card"><div class="eyebrow">Error de conexión</div>
      <p>No se pudo conectar con la base de datos. Revisá tu conexión a internet y volvé a intentar.</p>
      <p class="hint">${esc(err.message||err)}</p>
      <button class="btn btn-secondary" onclick="init()">Reintentar</button></div>`;
  }
}

document.querySelectorAll('.nav button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.view = btn.dataset.view;
    render();
  });
});

function render(){
  if(state.view==='nuevo') return renderNuevo();
  if(state.view==='historial') return renderHistorial();
  if(state.view==='clientes') return renderClientes();
  if(state.view==='materiales') return renderMateriales();
  if(state.view==='config') return renderConfig();
}

/* ============================================================
   VISTA: NUEVO PRESUPUESTO
   ============================================================ */
function calcTotales(){
  const subtotalMateriales = state.nuevoItems.reduce((s,i)=>s+i.subtotal,0);
  const horas = parseFloat(document.getElementById('f_horas')?.value || 0) || 0;
  const costoHora = parseFloat(document.getElementById('f_costohora')?.value || state.config.costo_hora || 0) || 0;
  const traslado = parseFloat(document.getElementById('f_traslado')?.value || 0) || 0;
  const gananciaPct = parseFloat(document.getElementById('f_ganancia')?.value ?? state.config.ganancia_porcentaje) || 0;
  const ivaPct = parseFloat(state.config.iva_porcentaje || 0);

  const manoObra = horas * costoHora;
  const base = subtotalMateriales + manoObra + traslado;
  const gananciaMonto = base * (gananciaPct/100);
  const conGanancia = base + gananciaMonto;
  const ivaMonto = conGanancia * (ivaPct/100);
  const total = conGanancia + ivaMonto;

  return {subtotalMateriales, horas, costoHora, traslado, gananciaPct, ivaPct, manoObra, base, gananciaMonto, conGanancia, ivaMonto, total};
}

function renderNuevo(){
  const clienteOpts = state.clientes.map(c=>`<option value="${c.id}">${esc(c.nombre)}</option>`).join('');
  $app.innerHTML = `
    <div class="section-title"><h2 style="font-size:17px;">Nuevo presupuesto</h2></div>

    <div class="card">
      <label>Cliente</label>
      <select id="f_cliente">
        <option value="">Sin cliente / a definir</option>
        ${clienteOpts}
      </select>
      <div class="hint">¿No está en la lista? Agregalo desde la pestaña Clientes.</div>

      <label>Título del trabajo</label>
      <input type="text" id="f_titulo" placeholder="Ej: Instalación eléctrica cocina">

      <label>Descripción (opcional)</label>
      <textarea id="f_descripcion" placeholder="Detalles del trabajo a realizar…"></textarea>
    </div>

    <div class="card">
      <div class="section-title"><h3 style="font-size:14px;">Materiales</h3></div>
      <div id="itemsList">${renderItemsList()}</div>
      <div class="autocomplete" style="margin-top:10px;">
        <label style="margin-top:0;">Agregar material</label>
        <input type="text" id="matSearch" placeholder="Buscar en catálogo o escribir nuevo…" autocomplete="off">
        <div id="matSuggest"></div>
      </div>
      <div class="row2">
        <div><label>Cantidad</label><input type="number" id="matCant" value="1" min="0" step="0.5"></div>
        <div><label>Precio unit.</label><input type="number" id="matPrecio" value="0" min="0" step="1"></div>
      </div>
      <button class="btn btn-outline" style="margin-top:10px;" onclick="addItemManual()">+ Agregar a la lista</button>
    </div>

    <div class="card">
      <div class="section-title"><h3 style="font-size:14px;">Mano de obra y otros</h3></div>
      <div class="row2">
        <div><label>Horas estimadas</label><input type="number" id="f_horas" value="0" min="0" step="0.5" oninput="refreshTotals()"></div>
        <div><label>Costo por hora</label><input type="number" id="f_costohora" value="${state.config.costo_hora||0}" min="0" oninput="refreshTotals()"></div>
      </div>
      <div class="row2">
        <div><label>Gastos de traslado</label><input type="number" id="f_traslado" value="0" min="0" oninput="refreshTotals()"></div>
        <div><label>% Ganancia</label><input type="number" id="f_ganancia" value="${state.config.ganancia_porcentaje||0}" min="0" oninput="refreshTotals()"></div>
      </div>
    </div>

    <div class="ticket">
      <div class="ticket-body">
        <div id="totalsBox"></div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="guardarPresupuesto()">Calcular y guardar presupuesto</button>
  `;
  document.getElementById('matSearch').addEventListener('input', onMatSearch);
  refreshTotals();
}

function renderItemsList(){
  if(state.nuevoItems.length===0){
    return `<div class="empty" style="padding:20px 8px;"><div class="eyebrow">Sin materiales todavía</div></div>`;
  }
  return state.nuevoItems.map(i=>`
    <div class="item-row">
      <div>
        <div class="item-name">${esc(i.nombre)}</div>
        <div class="item-meta">${i.cantidad} ${esc(i.unidad)} × ${money(i.precio_unitario)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="item-price">${money(i.subtotal)}</div>
        <button class="x-btn" onclick="removeItem('${i.tempId}')">✕</button>
      </div>
    </div>
  `).join('');
}

function onMatSearch(e){
  const q = e.target.value.trim().toLowerCase();
  const box = document.getElementById('matSuggest');
  if(q.length<1){ box.innerHTML=''; return; }
  const matches = state.materiales.filter(m=>m.nombre.toLowerCase().includes(q)).slice(0,6);
  if(matches.length===0){ box.innerHTML=''; return; }
  box.innerHTML = `<div class="autocomplete-list">${matches.map(m=>`
    <div class="autocomplete-item" onclick="pickMaterial('${m.id}')">
      <strong>${esc(m.nombre)}</strong> — ${money(m.precio_unitario)} / ${esc(m.unidad)}
    </div>`).join('')}</div>`;
}
function pickMaterial(id){
  const m = state.materiales.find(x=>x.id===id);
  if(!m) return;
  document.getElementById('matSearch').value = m.nombre;
  document.getElementById('matSearch').dataset.materialId = m.id;
  document.getElementById('matSearch').dataset.unidad = m.unidad;
  document.getElementById('matPrecio').value = m.precio_unitario;
  document.getElementById('matSuggest').innerHTML='';
}
function addItemManual(){
  const searchEl = document.getElementById('matSearch');
  const nombre = searchEl.value.trim();
  if(!nombre){ toast('Escribí o elegí un material'); return; }
  const cantidad = parseFloat(document.getElementById('matCant').value)||1;
  const precio = parseFloat(document.getElementById('matPrecio').value)||0;
  const unidad = searchEl.dataset.unidad || 'unidad';
  const materialId = searchEl.dataset.materialId || null;
  state.nuevoItems.push({
    tempId: uid(), material_id: materialId, nombre, cantidad, unidad,
    precio_unitario: precio, subtotal: cantidad*precio
  });
  searchEl.value=''; searchEl.dataset.materialId=''; searchEl.dataset.unidad='';
  document.getElementById('matCant').value=1;
  document.getElementById('matPrecio').value=0;
  document.getElementById('itemsList').innerHTML = renderItemsList();
  refreshTotals();
}
function removeItem(tempId){
  state.nuevoItems = state.nuevoItems.filter(i=>i.tempId!==tempId);
  document.getElementById('itemsList').innerHTML = renderItemsList();
  refreshTotals();
}
function refreshTotals(){
  const t = calcTotales();
  document.getElementById('totalsBox').innerHTML = `
    <div class="eyebrow">Resumen</div>
    <div class="totals" style="background:none;padding:0;">
      <div class="total-line"><span>Materiales</span><span>${money(t.subtotalMateriales)}</span></div>
      <div class="total-line"><span>Mano de obra (${t.horas}h × ${money(t.costoHora)})</span><span>${money(t.manoObra)}</span></div>
      <div class="total-line"><span>Traslado</span><span>${money(t.traslado)}</span></div>
      <div class="total-line"><span>Ganancia (${t.gananciaPct}%)</span><span>${money(t.gananciaMonto)}</span></div>
      <div class="total-line"><span>IVA (${t.ivaPct}%)</span><span>${money(t.ivaMonto)}</span></div>
      <div class="total-final"><span class="label">Total</span><span class="amount">${money(t.total)}</span></div>
    </div>
  `;
}

async function guardarPresupuesto(){
  const titulo = document.getElementById('f_titulo').value.trim();
  if(!titulo){ toast('Poné un título para el trabajo'); return; }
  if(state.nuevoItems.length===0 && !confirm('No agregaste materiales. ¿Guardar igual?')) return;

  const t = calcTotales();
  const clienteId = document.getElementById('f_cliente').value || null;
  const descripcion = document.getElementById('f_descripcion').value.trim();

  const payload = {
    cliente_id: clienteId, titulo, descripcion,
    horas_estimadas: t.horas, costo_hora: t.costoHora, costo_mano_obra: t.manoObra,
    gastos_traslado: t.traslado, ganancia_porcentaje: t.gananciaPct,
    subtotal: t.base, iva_porcentaje: t.ivaPct, iva_monto: t.ivaMonto, total: t.total,
    estado: 'borrador'
  };

  try{
    const {data: pres, error} = await sb.from('presupuestos').insert(payload).select().single();
    if(error) throw error;
    if(state.nuevoItems.length>0){
      const itemsPayload = state.nuevoItems.map(i=>({
        presupuesto_id: pres.id, material_id: i.material_id, nombre: i.nombre,
        cantidad: i.cantidad, unidad: i.unidad, precio_unitario: i.precio_unitario, subtotal: i.subtotal
      }));
      const {error: itemsErr} = await sb.from('presupuesto_items').insert(itemsPayload);
      if(itemsErr) throw itemsErr;
    }
    toast('Presupuesto guardado ✓');
    const cliente = state.clientes.find(c=>c.id===clienteId);
    showPresupuestoActions({...pres, items: state.nuevoItems, cliente});
    state.nuevoItems = [];
  }catch(err){
    toast('Error al guardar: '+(err.message||err));
  }
}

function showPresupuestoActions(pres){
  const modal = document.createElement('div');
  modal.className='modal-bg';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-head"><h3 style="font-size:16px;">Presupuesto #${pres.numero||''} listo</h3>
        <button class="modal-close" onclick="this.closest('.modal-bg').remove()">✕</button></div>
      <p class="hint">¿Qué querés hacer con "${esc(pres.titulo)}"?</p>
      <div class="btn-row" style="flex-direction:column;">
        <button class="btn btn-primary" onclick="descargarPDF('${pres.id}')">📄 Generar y descargar PDF</button>
        <button class="btn btn-secondary" onclick="compartirWhatsApp('${pres.id}')">💬 Compartir por WhatsApp</button>
        <button class="btn btn-outline" onclick="compartirEmail('${pres.id}')">✉️ Compartir por correo</button>
        <button class="btn btn-outline" onclick="this.closest('.modal-bg').remove()">Cerrar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  window._lastPresupuesto = pres;
}

/* ============================================================
   PDF
   ============================================================ */
async function fetchPresupuestoCompleto(id){
  if(window._lastPresupuesto && window._lastPresupuesto.id===id && window._lastPresupuesto.items){
    return window._lastPresupuesto;
  }
  const {data: pres, error} = await sb.from('presupuestos').select('*').eq('id', id).single();
  if(error) throw error;
  const {data: items} = await sb.from('presupuesto_items').select('*').eq('presupuesto_id', id);
  const cliente = pres.cliente_id ? state.clientes.find(c=>c.id===pres.cliente_id) : null;
  return {...pres, items: items||[], cliente};
}

async function buildPDF(pres){
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();
  const cfg = state.config;
  let y = 18;

  if(cfg.logo_base64){
    try{ doc.addImage(cfg.logo_base64, 'PNG', 14, y-6, 30, 20); }catch(e){}
  }
  doc.setFont('helvetica','bold'); doc.setFontSize(16);
  doc.text(cfg.nombre_negocio || 'Presupuesto', cfg.logo_base64 ? 50 : 14, y);
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  if(cfg.telefono) { y+=6; doc.text('Tel: '+cfg.telefono, cfg.logo_base64?50:14, y); }
  if(cfg.direccion) { y+=5; doc.text(cfg.direccion, cfg.logo_base64?50:14, y); }

  y = Math.max(y+12, 38);
  doc.setDrawColor(200); doc.line(14,y,196,y); y+=8;

  doc.setFont('helvetica','bold'); doc.setFontSize(11);
  doc.text('PRESUPUESTO Nº '+(pres.numero||''), 14, y);
  doc.setFont('helvetica','normal'); doc.setFontSize(9);
  doc.text(new Date(pres.created_at).toLocaleDateString('es-UY'), 196, y, {align:'right'});
  y+=8;

  if(pres.cliente){
    doc.setFont('helvetica','bold'); doc.text('Cliente:', 14, y);
    doc.setFont('helvetica','normal'); doc.text(pres.cliente.nombre, 32, y); y+=5;
    if(pres.cliente.telefono){ doc.text('Tel: '+pres.cliente.telefono, 32, y); y+=5; }
  }
  y+=3;
  doc.setFont('helvetica','bold'); doc.text('Trabajo:', 14, y);
  doc.setFont('helvetica','normal');
  const tituloLines = doc.splitTextToSize(pres.titulo, 150);
  doc.text(tituloLines, 34, y); y += tituloLines.length*5 + 2;

  if(pres.descripcion){
    const descLines = doc.splitTextToSize(pres.descripcion, 180);
    doc.setFontSize(8.5); doc.setTextColor(100);
    doc.text(descLines, 14, y); y += descLines.length*4.5 + 4;
    doc.setTextColor(0); doc.setFontSize(9);
  }
  y+=4;

  if(pres.items && pres.items.length>0){
    doc.autoTable({
      startY: y,
      head: [['Material','Cant.','Unidad','P. Unit.','Subtotal']],
      body: pres.items.map(i=>[i.nombre, i.cantidad, i.unidad, money(i.precio_unitario), money(i.subtotal)]),
      theme: 'grid',
      headStyles:{fillColor:[44,74,94]},
      styles:{fontSize:8.5, cellPadding:3},
      margin:{left:14, right:14}
    });
    y = doc.lastAutoTable.finalY + 8;
  }

  const rows = [
    ['Mano de obra (' + pres.horas_estimadas + 'h x ' + money(pres.costo_hora) + ')', money(pres.costo_mano_obra)],
    ['Gastos de traslado', money(pres.gastos_traslado)],
    ['Ganancia (' + pres.ganancia_porcentaje + '%)', money(pres.subtotal * pres.ganancia_porcentaje/100)],
    ['IVA (' + pres.iva_porcentaje + '%)', money(pres.iva_monto)],
  ];
  doc.autoTable({
    startY: y, body: rows, theme:'plain',
    styles:{fontSize:9, cellPadding:2},
    columnStyles:{0:{cellWidth:140},1:{halign:'right', cellWidth:42}},
    margin:{left:14,right:14}
  });
  y = doc.lastAutoTable.finalY + 4;

  doc.setDrawColor(44,74,94); doc.setLineWidth(0.6); doc.line(14,y,196,y); y+=8;
  doc.setFont('helvetica','bold'); doc.setFontSize(14);
  doc.text('TOTAL', 14, y);
  doc.text(money(pres.total), 196, y, {align:'right'});

  y+=14;
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(140);
  doc.text('Presupuesto generado con Presupuesto Inteligente Uruguay', 14, y);

  return doc;
}

async function descargarPDF(id){
  try{
    const pres = await fetchPresupuestoCompleto(id);
    const doc = await buildPDF(pres);
    doc.save(`presupuesto-${pres.numero||pres.id.slice(0,6)}.pdf`);
  }catch(err){ toast('Error generando PDF: '+(err.message||err)); }
}

async function compartirWhatsApp(id){
  try{
    const pres = await fetchPresupuestoCompleto(id);
    const doc = await buildPDF(pres);
    const blob = doc.output('blob');
    const file = new File([blob], `presupuesto-${pres.numero||''}.pdf`, {type:'application/pdf'});
    const texto = `Presupuesto: ${pres.titulo}\nTotal: ${money(pres.total)}`;
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:'Presupuesto', text: texto});
    } else {
      doc.save(`presupuesto-${pres.numero||''}.pdf`);
      window.open('https://wa.me/?text='+encodeURIComponent(texto+'\n(Adjuntá el PDF que se descargó)'), '_blank');
    }
  }catch(err){ if(err.name!=='AbortError') toast('Error: '+(err.message||err)); }
}

async function compartirEmail(id){
  try{
    const pres = await fetchPresupuestoCompleto(id);
    const doc = await buildPDF(pres);
    const blob = doc.output('blob');
    const file = new File([blob], `presupuesto-${pres.numero||''}.pdf`, {type:'application/pdf'});
    const texto = `Presupuesto: ${pres.titulo}\nTotal: ${money(pres.total)}`;
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:'Presupuesto', text: texto});
    } else {
      doc.save(`presupuesto-${pres.numero||''}.pdf`);
      const email = pres.cliente && pres.cliente.email ? pres.cliente.email : '';
      window.location.href = `mailto:${email}?subject=${encodeURIComponent('Presupuesto: '+pres.titulo)}&body=${encodeURIComponent(texto+'\n(Adjuntá el PDF que se descargó)')}`;
    }
  }catch(err){ if(err.name!=='AbortError') toast('Error: '+(err.message||err)); }
}

/* ============================================================
   VISTA: HISTORIAL
   ============================================================ */
async function renderHistorial(){
  $app.innerHTML = `<div class="loading">CARGANDO HISTORIAL…</div>`;
  const {data, error} = await sb.from('presupuestos').select('*').order('created_at', {ascending:false});
  if(error){ $app.innerHTML = `<div class="card">Error cargando historial.</div>`; return; }
  if(!data || data.length===0){
    $app.innerHTML = `<div class="empty"><div class="eyebrow">Historial vacío</div><p>Todavía no generaste ningún presupuesto.</p></div>`;
    return;
  }
  $app.innerHTML = `
    <h2 style="font-size:17px;margin-bottom:12px;">Historial</h2>
    ${data.map(p=>{
      const cliente = state.clientes.find(c=>c.id===p.cliente_id);
      return `
      <div class="ticket">
        <div class="ticket-head">
          <div>
            <div class="eyebrow">#${p.numero} · ${new Date(p.created_at).toLocaleDateString('es-UY')}</div>
            <div style="font-weight:700;font-size:15px;margin-top:2px;">${esc(p.titulo)}</div>
            <div class="item-meta">${cliente ? esc(cliente.nombre) : 'Sin cliente'}</div>
          </div>
          <span class="badge badge-${p.estado}">${p.estado}</span>
        </div>
        <div class="perf"></div>
        <div class="ticket-body">
          <div class="total-final" style="border:none;padding:0;">
            <span class="label">Total</span>
            <span class="amount" style="font-size:22px;">${money(p.total)}</span>
          </div>
          <div class="btn-row">
            <button class="btn btn-outline btn-sm" onclick="descargarPDF('${p.id}')">📄 PDF</button>
            <button class="btn btn-outline btn-sm" onclick="compartirWhatsApp('${p.id}')">💬 WhatsApp</button>
            <button class="btn btn-outline btn-sm" onclick="cambiarEstado('${p.id}')">Estado</button>
            <button class="btn btn-danger btn-sm" onclick="borrarPresupuesto('${p.id}')">✕</button>
          </div>
        </div>
      </div>`;
    }).join('')}
  `;
}

async function cambiarEstado(id){
  const opciones = ['borrador','enviado','aprobado','rechazado'];
  const nuevo = prompt('Nuevo estado (borrador / enviado / aprobado / rechazado):');
  if(!nuevo || !opciones.includes(nuevo.toLowerCase())) { if(nuevo) toast('Estado no válido'); return; }
  const {error} = await sb.from('presupuestos').update({estado: nuevo.toLowerCase()}).eq('id', id);
  if(error){ toast('Error: '+error.message); return; }
  toast('Estado actualizado');
  renderHistorial();
}
async function borrarPresupuesto(id){
  if(!confirm('¿Borrar este presupuesto? No se puede deshacer.')) return;
  const {error} = await sb.from('presupuestos').delete().eq('id', id);
  if(error){ toast('Error: '+error.message); return; }
  toast('Presupuesto borrado');
  renderHistorial();
}

/* ============================================================
   VISTA: CLIENTES
   ============================================================ */
function renderClientes(){
  $app.innerHTML = `
    <div class="section-title">
      <h2 style="font-size:17px;">Clientes</h2>
      <button class="fab-add" onclick="openClienteModal()">+ Nuevo</button>
    </div>
    <div class="card">
      ${state.clientes.length===0
        ? `<div class="empty"><div class="eyebrow">Sin clientes</div><p>Agregá tu primer cliente.</p></div>`
        : state.clientes.map(c=>`
          <div class="list-item">
            <div>
              <div class="name">${esc(c.nombre)}</div>
              <div class="meta">${esc(c.telefono||'')} ${c.email?'· '+esc(c.email):''}</div>
            </div>
            <div style="display:flex;gap:6px;">
              <button class="btn btn-outline btn-sm" onclick="openClienteModal('${c.id}')">Editar</button>
              <button class="x-btn" onclick="borrarCliente('${c.id}')">✕</button>
            </div>
          </div>`).join('')}
    </div>
  `;
}
function openClienteModal(id){
  const c = id ? state.clientes.find(x=>x.id===id) : null;
  const modal = document.createElement('div');
  modal.className='modal-bg';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-head"><h3 style="font-size:16px;">${c?'Editar':'Nuevo'} cliente</h3>
        <button class="modal-close" onclick="this.closest('.modal-bg').remove()">✕</button></div>
      <label>Nombre *</label><input type="text" id="cl_nombre" value="${c?esc(c.nombre):''}">
      <label>Teléfono</label><input type="tel" id="cl_telefono" value="${c?esc(c.telefono||''):''}">
      <label>Email</label><input type="email" id="cl_email" value="${c?esc(c.email||''):''}">
      <label>Dirección</label><input type="text" id="cl_direccion" value="${c?esc(c.direccion||''):''}">
      <label>Notas</label><textarea id="cl_notas">${c?esc(c.notas||''):''}</textarea>
      <button class="btn btn-primary" style="margin-top:14px;" onclick="guardarCliente(${c?`'${c.id}'`:'null'})">Guardar</button>
    </div>`;
  document.body.appendChild(modal);
}
async function guardarCliente(id){
  const nombre = document.getElementById('cl_nombre').value.trim();
  if(!nombre){ toast('El nombre es obligatorio'); return; }
  const payload = {
    nombre,
    telefono: document.getElementById('cl_telefono').value.trim(),
    email: document.getElementById('cl_email').value.trim(),
    direccion: document.getElementById('cl_direccion').value.trim(),
    notas: document.getElementById('cl_notas').value.trim(),
  };
  const q = id ? sb.from('clientes').update(payload).eq('id', id) : sb.from('clientes').insert(payload);
  const {error} = await q;
  if(error){ toast('Error: '+error.message); return; }
  toast('Cliente guardado');
  document.querySelector('.modal-bg').remove();
  const {data} = await sb.from('clientes').select('*').order('nombre');
  state.clientes = data||[];
  renderClientes();
}
async function borrarCliente(id){
  if(!confirm('¿Borrar este cliente?')) return;
  const {error} = await sb.from('clientes').delete().eq('id', id);
  if(error){ toast('Error: '+error.message); return; }
  state.clientes = state.clientes.filter(c=>c.id!==id);
  renderClientes();
}

        ? `<div class="empty"><div class="eyebrow">Catálogo vacío</div><p>Agregá materiales para reutilizarlos en tus presupuestos.</p></div>`
        : state.materiales.map(m=>`

              <div class="name">${esc(m.nombre)}</div>

function openMaterialModal(id){

  modal.className='modal-bg';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-head"><h3 style="font-size:16px;">${m?'Editar':'Nuevo'} material</h3>
        <button class="modal-close" onclick="this.closest('.modal-bg').remove()">✕</button></div>
      <label>Nombre *</label><input type="text" id="mt_nombre" value="${m?esc(m.nombre):''}">
      <div class="row2">

async function guardarMaterial(id){

  toast('Material guardado');

  const {data} = await sb.from('materiales').select('*').order('nombre');
  state.materiales = data||[];
  renderMateriales();

async function borrarMaterial(id){
  if(!confirm('¿Borrar este material del catálogo?')) return;
  const {error} = await sb.from('materiales').delete().eq('id', id);
  if(error){ toast('Error: '+error.message); return; }
  state.materiales = state.materiales.filter(m=>m.id!==id);
  renderMateriales();

   VISTA: CONFIGURACIÓN
   ============================================================ */
function renderConfig(){
  const c = state.config;
  $app.innerHTML = `
    <h2 style="font-size:17px;margin-bottom:12px;">Configuración</h2>
    <div class="card">
      <div class="eyebrow">Negocio</div>
      <label>Nombre del negocio</label><input type="text" id="cfg_nombre" value="${esc(c.nombre_negocio||'')}">
      <label>Teléfono</label><input type="tel" id="cfg_telefono" value="${esc(c.telefono||'')}">
      <label>Dirección</label><input type="text" id="cfg_direccion" value="${esc(c.direccion||'')}">
      <label>Logo (aparece en el PDF)</label>
      ${c.logo_base64 ? `<img src="${c.logo_base64}" class="logo-preview">` : ''}
      <input type="file" id="cfg_logo" accept="image/*">
      <div class="hint">Usá un logo chico (PNG, fondo transparente si podés).</div>
    </div>
    <div class="card">
      <div class="eyebrow">Cálculo</div>
      <label>Moneda</label>
      <select id="cfg_moneda">
        <option value="UYU" ${c.moneda==='UYU'?'selected':''}>Pesos uruguayos ($)</option>
        <option value="USD" ${c.moneda==='USD'?'selected':''}>Dólares (US$)</option>
      </select>
      <label>IVA (%)</label><input type="number" id="cfg_iva" value="${c.iva_porcentaje}" min="0">
      <label>Ganancia por defecto (%)</label><input type="number" id="cfg_ganancia" value="${c.ganancia_porcentaje}" min="0">
      <label>Costo por hora por defecto</label><input type="number" id="cfg_costohora" value="${c.costo_hora}" min="0">
    </div>
    <button class="btn btn-primary" onclick="guardarConfig()">Guardar configuración</button>
  `;
}
async function guardarConfig(){
  const c = state.config;
  const fileInput = document.getElementById('cfg_logo');
  let logo_base64 = c.logo_base64;
  if(fileInput.files && fileInput.files[0]){
    logo_base64 = await new Promise((res,rej)=>{
      const r = new FileReader();
      r.onload = ()=>res(r.result);
      r.onerror = rej;
      r.readAsDataURL(fileInput.files[0]);
    });
  }
  const payload = {
    nombre_negocio: document.getElementById('cfg_nombre').value.trim(),
    telefono: document.getElementById('cfg_telefono').value.trim(),
    direccion: document.getElementById('cfg_direccion').value.trim(),
    moneda: document.getElementById('cfg_moneda').value,
    iva_porcentaje: parseFloat(document.getElementById('cfg_iva').value)||0,
    ganancia_porcentaje: parseFloat(document.getElementById('cfg_ganancia').value)||0,
    costo_hora: parseFloat(document.getElementById('cfg_costohora').value)||0,
    logo_base64,
    updated_at: new Date().toISOString()
  };
  const {error} = await sb.from('configuracion').update(payload).eq('id', c.id);
  if(error){ toast('Error: '+error.message); return; }
  state.config = {...c, ...payload};
  document.getElementById('brandName').textContent = state.config.nombre_negocio || 'Presupuesto Inteligente';
  toast('Configuración guardada ✓');
}

init();
</script>
